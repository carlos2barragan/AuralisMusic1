<div class="auth-scene" (mousemove)="onMouseMove($event)" (mouseleave)="onMouseLeave()">

  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>

  <!-- Floating music notes -->
  <span class="note n1">♪</span>
  <span class="note n2">♫</span>
  <span class="note n3">♩</span>
  <span class="note n4">♬</span>
  <span class="note n5">♪</span>

  <!-- Grid lines -->
  <div class="grid"></div>

  <!-- 3D Card -->
  <div class="card-perspective">
    <div class="auth-card" [style.transform]="cardTransform">

      <!-- Spinning decorative rings -->
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>

      <!-- Glass card content -->
      <div class="card-inner">
        <div class="logo-wrap">
          <img
            src="https://res.cloudinary.com/dbt58u6ag/image/upload/v1740601259/uploads/zwutfwchdyr0qxo0b9vv.png"
            alt="Auralis"
            class="logo"
          />
          <div class="logo-glow"></div>
        </div>

        <h1 class="card-title">Bienvenido</h1>
        <p class="card-subtitle">Inicia sesión para escuchar música</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

          <div class="field">
            <input
              type="email"
              id="login-email"
              formControlName="email"
              placeholder=" "
              autocomplete="email"
            />
            <label for="login-email">Email</label>
            <div class="field-line"></div>
          </div>

          <div class="field">
            <input
              [type]="passwordVisible ? 'text' : 'password'"
              id="login-password"
              formControlName="password"
              placeholder=" "
              autocomplete="current-password"
            />
            <label for="login-password">Contraseña</label>
            <div class="field-line"></div>
            <button type="button" class="eye-btn" (click)="togglePasswordVisibility()">
              {{ passwordVisible ? '👁' : '👁‍🗨' }}
            </button>
          </div>

          <div class="error-msg" *ngIf="errorMessage">
            <span>⚠ {{ errorMessage }}</span>
          </div>

          <button type="submit" class="submit-btn" [class.loading]="false">
            <span class="btn-text">Iniciar sesión</span>
            <span class="btn-shine"></span>
          </button>

        </form>

        <p class="switch-link">
          ¿No tienes cuenta?
          <a routerLink="/register">Regístrate gratis</a>
        </p>
      </div>
    </div>
  </div>

</div>
