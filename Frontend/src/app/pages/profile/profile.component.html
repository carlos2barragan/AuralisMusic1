<app-header></app-header>
<app-sidebar (songSelected)="playSong($event)"></app-sidebar>

<main class="main-content">

  <!-- ── Hero banner ── -->
  <div class="profile-hero">
    <div class="hero-gradient"></div>
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>

    <div class="hero-body">
      <!-- Avatar -->
      <div class="avatar-wrap">
        <img
          [src]="user.avatar || defaultAvatar"
          [alt]="user.nombre || 'Usuario'"
          class="avatar"
        />
        <div class="avatar-ring ring-1"></div>
        <div class="avatar-ring ring-2"></div>
        <div class="avatar-glow"></div>
      </div>

      <!-- User info -->
      <div class="hero-info">
        <h1 class="hero-name">{{ user.nombre || 'Usuario' }}</h1>
        <div class="hero-meta">
          <span class="role-badge" [class.cantante-badge]="esCantante()">
            {{ esCantante() ? '🎤 Artista' : '🎧 Oyente' }}
          </span>
          <span class="email-text">{{ user.email }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Body ── -->
  <div class="profile-body">

    <!-- Action card -->
    <div class="action-card" *ngIf="!esCantante()">
      <div class="action-icon">🎤</div>
      <div class="action-info">
        <h3>¿Quieres compartir tu música?</h3>
        <p>Conviértete en artista y sube tus canciones a Auralis</p>
      </div>
      <button (click)="sendRequest()" class="action-btn">Ser artista</button>
    </div>

    <div class="action-card action-card-singer" *ngIf="esCantante()">
      <div class="action-icon">🎵</div>
      <div class="action-info">
        <h3>¡Eres un artista!</h3>
        <p>Comparte tu música con el mundo desde el panel de subida</p>
      </div>
      <a routerLink="/subir" class="action-btn">Subir canción</a>
    </div>

    <!-- Playlists section -->
    <section class="pl-section">
      <div class="pl-section-header">
        <h2 class="section-title">Mis Playlists</h2>
      </div>
      <app-playlist></app-playlist>
    </section>

  </div>
</main>

<app-music-player></app-music-player>
