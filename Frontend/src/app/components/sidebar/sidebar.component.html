<!-- Left-edge hot zone: opens sidebar when mouse reaches the left side of the screen -->
<div class="edge-trigger" *ngIf="!isOpen" (mouseenter)="open()"></div>

<!-- Backdrop -->
<div class="sb-backdrop" [class.visible]="isOpen" (click)="close()"></div>

<!-- Drawer -->
<aside class="sidebar" [class.open]="isOpen">

  <div class="sb-orb"></div>
  <div class="sb-orb sb-orb-2"></div>

  <!-- Header -->
  <div class="sb-header">
    <a routerLink="/home" class="sb-logo-link" (click)="close()">
      <img
        src="https://res.cloudinary.com/dbt58u6ag/image/upload/v1740601259/uploads/zwutfwchdyr0qxo0b9vv.png"
        alt="Auralis"
        class="sb-logo"
      />
    </a>
    <button class="sb-close" (click)="close()" aria-label="Cerrar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Intro label -->
  <div class="sb-intro">
    <span class="sb-intro-title">Explorar géneros</span>
    <span class="sb-intro-sub">Escucha música por estilo</span>
  </div>

  <!-- Genre grid -->
  <div class="genre-grid" *ngIf="genres.length > 0">
    <button
      class="genre-card"
      *ngFor="let g of genres; let i = index"
      [style.--i]="i"
      [style.background]="g.gradient"
      (click)="goToGenre(g)">
      <span class="gc-icon">{{ g.icon }}</span>
      <span class="gc-name">{{ g.name }}</span>
      <span class="gc-count">{{ g.count }} {{ g.count === 1 ? 'canción' : 'canciones' }}</span>
      <div class="gc-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>
    </button>
  </div>

  <!-- Loading skeleton -->
  <div class="genre-grid" *ngIf="genres.length === 0">
    <div class="genre-skeleton" *ngFor="let i of [1,2,3,4,5,6]"></div>
  </div>

</aside>
