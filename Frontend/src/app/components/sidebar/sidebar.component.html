<aside class="sidebar">

  <nav class="nav-links">
    <a routerLink="/home" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Inicio</span>
    </a>
    <a routerLink="/playlist" class="nav-item">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Mis Playlists</span>
    </a>
    <a routerLink="/profile" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Perfil</span>
    </a>
  </nav>

  <div class="sidebar-divider"></div>

  <div class="search-section">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        [(ngModel)]="searchQuery"
        placeholder="Buscar canción..."
        (click)="toggleSearch()"
        (input)="filterSongs()"
      />
    </div>

    <ul class="search-results" *ngIf="isSearchVisible && filteredSongs.length > 0">
      <li *ngFor="let song of filteredSongs | slice:0:8" class="result-item">
        <img
          *ngIf="song.imagen"
          [src]="song.imagen.startsWith('http') ? song.imagen : 'https://res.cloudinary.com/dbt58u6ag/image/upload/v1740519430/' + song.imagen"
          [alt]="song.titulo"
          class="result-img"
        />
        <div class="result-info">
          <span class="result-title">{{ song.titulo || 'Sin título' }}</span>
          <span class="result-artist">{{ song.cantante?.cantante || 'Artista desconocido' }}</span>
        </div>
        <button class="play-btn" title="Reproducir" (click)="playSong(song)">▶</button>
      </li>
    </ul>
  </div>

</aside>
