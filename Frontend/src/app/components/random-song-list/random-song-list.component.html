<div class="song-table">
  <div class="table-header">
    <span class="col-num">#</span>
    <span class="col-title">Título</span>
    <span class="col-album">Álbum</span>
    <span class="col-genre">Género</span>
    <span class="col-action"></span>
  </div>

  <div
    *ngFor="let song of songs; let i = index"
    class="table-row"
    (click)="selectSong(song)"
  >
    <span class="col-num">
      <span class="col-num-val">{{ i + 1 }}</span>
      <span class="col-num-play">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M5 3l14 9-14 9V3z"/></svg>
      </span>
    </span>

    <div class="col-title">
      <img
        *ngIf="song.imagen"
        [src]="song.imagen.startsWith('http') ? song.imagen : 'https://res.cloudinary.com/dbt58u6ag/image/upload/v1740519430/' + song.imagen"
        [alt]="song.titulo"
        class="song-thumb"
      />
      <div class="song-meta">
        <span class="song-name">{{ song.titulo || 'Sin título' }}</span>
        <span class="song-artist" (click)="goToArtist(song, $event)">{{ song.cantante?.cantante || 'Artista desconocido' }}</span>
      </div>
    </div>

    <span class="col-album">{{ song.album || '—' }}</span>
    <span class="col-genre">{{ song.genero || '—' }}</span>

    <div class="col-action">
      <button class="add-btn" title="Añadir a playlist" (click)="addToPlaylist(song); $event.stopPropagation()">+</button>
    </div>
  </div>
</div>

<div *ngIf="showModal" class="modal-overlay" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h3 class="modal-title">Agregar a playlist</h3>

    <ul *ngIf="playlists.length > 0; else noPlaylists" class="playlist-list">
      <li *ngFor="let playlist of playlists">
        <button class="playlist-btn" (click)="confirmAddToPlaylist(playlist._id)">
          🎵 {{ playlist.nombre }}
        </button>
      </li>
    </ul>

    <ng-template #noPlaylists>
      <p class="no-playlists">No tienes playlists aún.</p>
    </ng-template>

    <div class="new-playlist-section">
      <p class="section-label">Crear nueva playlist</p>
      <div class="new-playlist-input">
        <input
          type="text"
          [(ngModel)]="newPlaylistName"
          placeholder="Nombre de la playlist"
          (keyup.enter)="createNewPlaylist()"
        />
        <button class="create-btn" (click)="createNewPlaylist()">Crear</button>
      </div>
    </div>

    <button class="close-btn" (click)="closeModal()">Cancelar</button>
  </div>
</div>
