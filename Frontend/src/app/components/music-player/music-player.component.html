<div class="player" *ngIf="currentSong">
  <div class="song-details">
    <img class="song-image" [src]="currentSong?.imagen || 'assets/default-cover.jpg'" alt="Portada" />
    <div class="song-info">
      <h4>{{ currentSong?.titulo || 'Sin título' }}</h4>
      <p *ngIf="currentSong?.cantante?.cantante">{{ currentSong.cantante.cantante }}</p>
    </div>
  </div>

  <div class="player-controls">
    <div class="controls">
      <button (click)="playRandom()" title="Aleatorio">🔀</button>
      <button (click)="prevSong()" title="Anterior">⏮</button>
      <button class="play-pause-btn" (click)="togglePlay()" title="{{ isPlaying ? 'Pausar' : 'Reproducir' }}">
        {{ isPlaying ? '⏸' : '▶' }}
      </button>
      <button (click)="nextSong()" title="Siguiente">⏭</button>
    </div>

    <div class="progress-container">
      <span>{{ formatTime(currentTime) }}</span>
      <input type="range" min="0" [max]="duration" [value]="currentTime" (input)="seekTo($event)" />
      <span>{{ formatTime(duration) }}</span>
    </div>
  </div>

  <div class="volume-control">
    <i>🔊</i>
    <input
      type="range"
      min="0"
      max="1"
      step="0.01"
      [(ngModel)]="volume"
      (input)="adjustVolume()"
    />
  </div>
</div>
