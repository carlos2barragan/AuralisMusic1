<div class="pl-wrapper">
  <div class="pl-grid" *ngIf="playlists.length > 0; else emptyState">
    <div
      *ngFor="let p of playlists; let i = index"
      class="pl-card"
      [style.--i]="i"
      (click)="goToPlaylist(p._id)">
      <div class="pl-card-cover">
        <!-- Gradient placeholder with music note -->
        <div class="pl-cover-gradient" [style.--hue]="(i * 47 + 200) % 360">
          <span class="pl-cover-icon">♫</span>
        </div>
        <div class="pl-card-overlay">
          <button class="pl-play-btn">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M5 3l14 9-14 9V3z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="pl-card-info">
        <span class="pl-card-name">{{ p.nombre }}</span>
        <span class="pl-card-count">{{ p.canciones?.length || 0 }} canciones</span>
      </div>
    </div>
  </div>

  <ng-template #emptyState>
    <div class="pl-empty">
      <div class="pl-empty-icon">🎵</div>
      <h3>Sin playlists todavía</h3>
      <p>Busca canciones y agrégalas a una nueva playlist</p>
    </div>
  </ng-template>
</div>
