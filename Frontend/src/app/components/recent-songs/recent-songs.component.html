<div class="song-list">
  <h2> Canciones Más Recientes</h2>
  <ul>
    <li *ngFor="let song of songs.slice(0, 4)">
      <img [src]="song.imagen" [alt]="song.cantante.cantante" class="song-img">
      <div>
        <strong>{{ song.cantante.cantante }}</strong> - {{ song.album }}
      </div>
    </li>
  </ul>
</div>
