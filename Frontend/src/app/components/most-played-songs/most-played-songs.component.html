<div class="cards-row">
  <div
    *ngFor="let song of songs"
    class="song-card"
    (click)="songSelected.emit(song)"
  >
    <div class="card-img-wrap">
      <img [src]="song.imagen || 'assets/default-cover.jpg'" [alt]="song.titulo" class="card-img" />
      <div class="play-overlay">
        <span class="play-icon">▶</span>
      </div>
    </div>
    <div class="card-info">
      <span class="card-title">{{ song.titulo }}</span>
      <span class="card-artist">{{ song.cantante?.cantante || 'Artista desconocido' }}</span>
    </div>
  </div>
</div>
